on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup java
        uses: actions/setup-java@v5.5.0
        with:
          java-version-file: '.tool-versions'
          distribution: 'temurin'
          cache: 'maven'

      - name: Maven build, test and verify
        run: ./mvnw verify -Pnative -Dquarkus.container-image.build=true